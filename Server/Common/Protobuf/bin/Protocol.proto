syntax = "proto3";
package Protocol;

import "Enum.proto";
import "Struct.proto";

message C_S_LOGIN
{ 
    string playerId = 1; 
}
message S_C_LOGIN 
{
    bool success = 1;
}

message C_S_ENTER_GAME 
{
}

message S_C_ENTER_GAME 
{
    bool success = 1;
    int32 myObjectId = 2;
    repeated SpawnEntry spawns = 3;
}

message C_S_LEAVE_GAME
{

}

message S_C_LEAVE_GAME 
{
    bool success = 1;
}

message S_C_SPAWN 
{
    SpawnEntry spawn = 1;
}

message S_C_DESPAWN
{
    int32 objectId = 1;
}

message C_S_MOVE 
{
	float posX = 1;
	float posY = 2;
	float dirX = 3;
	float dirY = 4;
	int32 stateFlags = 5;
}

message S_C_MOVE 
{
	int32 objectId = 1;
	float posX = 2;
	float posY = 3;
	int32 stateFlags = 4;
	float dirX = 5;
	float dirY = 6;
}


message C_S_ATTACK 
{
	float dirX = 1;
	float dirY = 2;
}

message S_C_ATTACK 
{
	int32 attackerId = 1;
	float dirX = 2;
	float dirY = 3;
	int32 targetId = 4;
	int32 targetHp = 5;
	float targetDirX = 6;
	float targetDirY = 7;
}

message S_C_DIE 
{
	int32 objectId = 1;
}

message C_S_CHAT 
{
    string msg = 1;
    int32 chatType =2;
}

message S_C_CHAT 
{
    int32 objectId = 1;
    string msg = 2;
    int32 chatType =3;
}
